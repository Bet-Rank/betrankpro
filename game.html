            { num:'3', title:'AI-Enhanced "Batting Average" Analytics', body:`<p>This is the exclusive edge our platform provides. While every "Burst" is determined by a Provably Fair RNG, our platform integrates an AI-Predictive Scoreboard.</p><p><strong>The Logic:</strong> Much like real cricket, the game often goes through "Wicket Streaks" (low multipliers) and "Century Stands" (high multipliers).</p><p><strong>The AI Skill:</strong> Our site features a "Live Ball-Trajectory Tracker." Our AI analyzes the last 100 "hits" and identifies the current "Pitch Condition" (the volatility state of the RNG).</p><p><strong>The Advantage:</strong> If the last five balls have burst below 1.20x, our AI highlights the "Green Zone" (the 2x to 5x range) as a high-probability recovery area. You aren't just guessing the flight; you are betting with a data-backed "Strike Rate" that maximizes your rewards.</p>` },
            { num:'4', title:'Advanced Tactic: The "Powerplay" Dual-Bet', body:`<p>Professional Cricket X players on our site utilize the Dual-Bet Interface to simulate a real match strategy:</p><div class="highlight-box"><p><strong>Bet 1 (The Single):</strong> Place a larger bet and set an Auto-Cashout at 1.50x. This is your "Base Score" to ensure you don't lose your principal.</p><p><strong>Bet 2 (The Six):</strong> Place a smaller bet with no Auto-Cashout. This is your "Aggressive Strike." You let this ball fly into the "Space Zone" (50x+) to chase the massive jackpot.</p></div><p>Our AI Bankroll Manager calculates the perfect ratio between your "Single" and your "Six," ensuring your overall session remains in the profit even if the ball bursts early.</p>` },
            { num:'5', title:'Why Play Cricket X on Our Platform?', body:`<div class="highlight-box"><p><strong>Instant Replay Transparency:</strong> Every flight in Cricket X is cryptographically hashed. You can verify the "Burst Point" after every round to ensure 100% fairness.</p><p><strong>Sub-Second Execution:</strong> In a game where the multiplier moves at lightning speed, lag is a "Duck." Our platform uses High-Velocity WebSockets, ensuring that the moment you click "Cash Out," the multiplier is locked in.</p><p><strong>Mobile-First "Swipe-to-Win":</strong> Our mobile app is designed for one-handed play. You can trigger your cash-out with a simple thumb-press, optimized for those high-pressure moments when the multiplier hits 100x.</p></div>` },
            { num:'6', title:'The "Stadium Crowd" Social Pulse', body:`<p>Cricket X is a social experience. On the left of the screen, you see the Live Leaderboard.</p><p><strong>The Whale Tracker:</strong> Our AI flags "Big Hitters" — players who are consistently cashing out at high multipliers.</p><p><strong>The Strategy:</strong> Many of our top users follow the "Whale Sentiment." If the top players are staying in for the 10x mark, it's a strong AI-backed signal that the current game seed is in a "Stable Flight" cycle.</p>` },
            { num:'7', title:'Instant Payouts: From the Boundary to the Bank', body:`<p>Hit a massive 500x space-shot? You don't have to wait for the next "Innings." Our Direct-to-Wallet API moves your winnings into your EasyPaisa or JazzCash account instantly. We provide the fastest withdrawal system for Cricket X in the market, ensuring your "Match Fees" are paid out immediately.</p>` },
        ]

    5: { // JETX
        sections: [
            { num:'1', title:'The Core Concept: The Galaxy\'s Infinite Multiplier', body:`<p>JetX is an "Instant Crash" game set at a futuristic spaceport. A pixel-art jet takes off from the runway, and as it climbs into the stratosphere and eventually into deep space, the multiplier increases. Unlike other games, JetX is famous for its "Infinite Ceiling." While the plane usually crashes early, it is mathematically capable of reaching 10,000x or even 50,000x. On our platform, JetX isn't just a game; it's an endurance test of your nerves.</p>` },
            { num:'2', title:'The Multi-Bet Dashboard: Tactical Redundancy', body:`<p>To succeed on our platform, you must master the Dual-Bet System. This is the foundation of professional JetX play:</p><div class="highlight-box"><p><strong>Bet A (The Foundation):</strong> Place a large bet (e.g., 2,000 PKR) and set the Auto-Cashout at 1.35x. This covers your total stake for the round.</p><p><strong>Bet B (The Moonshot):</strong> Place a small bet (e.g., 200 PKR) and disable Auto-Cashout. This is your "pure profit" bet. You let this fly until the jet enters the "Dark Space" zone (usually 20x+).</p></div><p>The Result: Even if the jet explodes at 1.5x, you walk away with a small profit from Bet A. If it reaches 50x, your Bet B turns a tiny stake into a massive EasyPaisa withdrawal.</p>` },
            { num:'3', title:'AI-Enhanced "Explosion-Zone" Analytics', body:`<p>This is where our platform gives you the "Command Center" edge. While the crash point is random, digital RNGs often move in "Volatility Waves."</p><p><strong>The Logic:</strong> After a "Galaxy Crash" (anything over 100x), the game often goes through a "Re-Stabilization" phase where crashes happen below 1.2x.</p><p><strong>The AI Skill:</strong> Our site features a "Live Altitude Probability" meter. Our AI monitors the last 50 flights in real-time.</p><p><strong>The Advantage:</strong> When the jet passes 2.0x, the AI displays a "Survival Chance" percentage. If the AI detects a high-volatility wave, it will flash the Cashout button in a "Warning Red," signaling that the mathematical probability of a crash in the next 0.5 seconds has spiked by 15%.</p>` },
            { num:'4', title:'The "Galaxy Jackpot" (The AI Reward System)', body:`<p>One of the unique features of JetX on our site is the Progressive Galaxy Jackpot.</p><div class="highlight-box"><p><strong>How it Works:</strong> A small percentage of every bet made on our platform goes into a communal pool.</p><p><strong>The Trigger:</strong> The Jackpot is awarded randomly, but only to players who have a running bet when the jet reaches a specific altitude (usually 1.5x or higher).</p><p><strong>AI Selection:</strong> Our AI monitors player consistency. Players who use "Smart Betting" are prioritized for "Jackpot Alerts," ensuring the biggest rewards go to our most dedicated pilots.</p></div>` },
            { num:'5', title:'Advanced Tactic: The "Anti-Gravity" Martingale', body:`<p>Standard Martingale (doubling after a loss) is risky in JetX because of the speed. Our AI suggests the "Anti-Gravity" variation:</p><div class="highlight-box"><p><strong>The Base:</strong> Start with a small bet.</p><p><strong>The Streak:</strong> If you win, triple your bet for the next round but lower your Cashout target.</p><p><strong>The Logic:</strong> You are using the "House Money" to chase the momentum. Our AI Profit-Lock feature allows you to automate this, ensuring that if you hit a 3-win streak, the system automatically banks 50% of the profit to your JazzCash wallet before the next flight.</p></div>` },
            { num:'6', title:'Why Play JetX on Our Platform?', body:`<div class="highlight-box"><p><strong>High-Definition Pixel Sync:</strong> We have optimized the JetX engine to run with Zero Frame-Drop. In a game where the jet can explode in a fraction of a second, seeing the altitude perfectly is vital.</p><p><strong>Global Pilot Chat:</strong> Our site features a Live Chat and Bet-Tracker. You can see exactly when the "Whales" (big bettors) eject.</p><p><strong>AI Sentiment Analysis:</strong> Our sidebar shows a "Fear vs. Greed" index. If the index is 90% "Fear," it means most players are cashing out early. This is often the best time to "Go Long," as the RNG algorithm rebalances the payout pool.</p></div>` },
            { num:'7', title:'Instant Multi-Wallet Support', body:`<p>Winning 50,000 PKR on a space-shot feels great — getting it into your bank feels better. Our Direct-to-Wallet API ensures that JetX winnings are never "stuck." Whether you use EasyPaisa, JazzCash, or USDT, your JetX credits are converted to real currency and sent to your account with a single click in the "Withdraw" menu.</p>` },

    6: { // GOAL
        sections: [
            { num:'1', title:'The Core Concept: A Digital Path to the Back of the Net', body:`<p>Goal is an instant-win game where you navigate a football across a field divided into vertical columns. Each column represents a step closer to the "Goal." Inside each column are hidden tiles — some contain a Football (Success), and one contains a Bomb (Loss). Your objective is to click a tile in each column to advance across the field. Every successful step increases your multiplier. If you reach the final column and score, you hit the maximum jackpot for that round.</p>` },
            { num:'2', title:'Choosing Your Field: The Three Difficulty Levels', body:`<div class="highlight-box"><p><strong>Small Field (3x4 Grid) — The "Sprint":</strong> It has the fewest columns and rows, meaning you reach the goal faster, but the multipliers grow more modestly.</p><p><strong>Medium Field (4x7 Grid) — The "Midfield Battle":</strong> This offers a balanced experience with a longer path and higher potential rewards.</p><p><strong>Big Field (5x10 Grid) — The "World Cup Final":</strong> This is the longest path, but it features the highest multipliers. Reaching the end of a Big Field on our platform can turn a small stake into a massive, life-changing payout.</p></div>` },
            { num:'3', title:'The "Advantage Rule": Cashing Out at Any Step', body:`<p>The most powerful feature of Goal on our site is the Instant Cash-Out. You do not have to reach the goal to win.</p><p><strong>The Strategy:</strong> You can take a 1.5x or 2.0x win after just two or three successful steps.</p><p><strong>The Flexibility:</strong> If you feel a "Bomb" is coming in the next column, you can click the "Cash Out" button and your winnings are instantly moved to your EasyPaisa or JazzCash balance. You have 100% control over when to bank your profit.</p>` },
            { num:'4', title:'AI-Enhanced "Explosive-Detection" Technology', body:`<p>This is the exclusive edge our platform provides. While the bombs are placed by a Provably Fair RNG, our platform integrates an AI Probability Mapper.</p><p><strong>The Logic:</strong> In any digital grid, there are "Safe Zones" that emerge based on previous rounds.</p><p><strong>The AI Skill:</strong> Our system monitors the last 100 rounds and displays a "Safe-Step Indicator." As you hover your mouse or finger over a tile, the AI calculates the historical frequency of bombs in that specific coordinate.</p><p><strong>The Advantage:</strong> If a certain tile has been "Clean" for 10 rounds, our AI highlights it with a subtle green aura. While not a guarantee, using this Heat-Map Data allows our players to move across the field with a statistical advantage that other sites simply don't offer.</p>` },
            { num:'5', title:'Advanced Tactic: The "Zig-Zag" Maneuver', body:`<p>Our backend AI analysis has shown that the RNG often distributes bombs in "Vertical Clusters."</p><p><strong>The Pro Move:</strong> Professional Goal players on our site rarely click tiles in a straight line. They use the Zig-Zag Pattern (e.g., Row 1, Column 1 → Row 3, Column 2 → Row 5, Column 3).</p><p><strong>AI Logic:</strong> This pattern effectively "breaks" the vertical clustering of the RNG, increasing your chances of finding the clear path. Our AI Pattern Memory tool can even record your successful "Goal Paths," allowing you to re-play them with a single click in future rounds.</p>` },
            { num:'6', title:'Why Play Goal on Our Platform?', body:`<div class="highlight-box"><p><strong>Zero-Input Lag:</strong> In Goal, a "miss-click" is fatal. Our site is optimized for Zero-Latency, ensuring that the tile you click is exactly the tile that opens.</p><p><strong>Instant Wallet Integration:</strong> Scored a goal and hit a 10x multiplier? That profit is immediately available for withdrawal. We process JazzCash and EasyPaisa transactions faster than any other platform in the market.</p><p><strong>Provably Fair Verification:</strong> After every match, you can check the Game Hash. This proves that the location of the bombs was determined before the first kick and was never changed, guaranteeing a 100% fair match.</p></div>` },
            { num:'7', title:'The "Golden Goal" Bonus', body:`<p>Randomly, our AI will trigger a "Golden Goal" round. During this special event, the multipliers for reaching the final column are doubled. If you have been playing consistently and showing "Disciplined Growth," our AI is more likely to trigger this bonus for you, turning a standard win into a legendary one.</p>` },
        ]
    },
    8: { // DINOSAUR TYCOON
        sections: [
            { num:'1', title:'The Core Concept: Action-Based Multipliers', body:`<p>Dinosaur Tycoon is a "Shooting" or "Fishing" style game that trades the stress of a crashing plane for the adrenaline of a jungle hunt. Instead of betting on a single outcome, you buy "bullets." Each bullet has a value (your stake), and every dinosaur on the screen has a specific health bar and a corresponding multiplier. When a dinosaur falls under your fire, you receive your bullet value multiplied by that dinosaur's worth. It is a game of Resource Management and Target Prioritization.</p>` },
            { num:'2', title:'The Arsenal: Strategic Weapon Selection', body:`<p>On our platform, Dinosaur Tycoon isn't just about clicking rapidly; it's about using the right tool for the right beast.</p><div class="highlight-box"><p><strong>The Standard Cannon:</strong> Best for clearing "Small Fry" like Raptors or Pterodactyls to keep your balance ticking upward.</p><p><strong>The Lightning Chain:</strong> A specialized weapon that, when triggered, strikes one dinosaur and chains to three others nearby. This is the most efficient way to clear a crowded screen.</p><p><strong>The Heavy Artillery (Laser):</strong> This consumes more credits per shot but deals massive damage. Professional players save this exclusively for the "Boss" dinosaurs.</p></div>` },
            { num:'3', title:'The "Big Three" High-Value Targets', body:`<p>To win big on our site, you must ignore the distractions and focus on the "Tycoon" targets:</p><div class="highlight-box"><p><strong>The Golden T-Rex:</strong> The king of the jungle. Taking him down doesn't just give a flat win; it triggers the Golden Prize Wheel, which can multiply your total round winnings by up to 500x.</p><p><strong>The Mammoths &amp; Triceratops:</strong> These are the "Tank" dinosaurs. They take many hits, but they act as "walking multipliers" that leak coins every time you hit them, even before they die.</p><p><strong>The Special Eggs:</strong> Occasionally, glowing eggs appear. Breaking these triggers "Free Bullet Mode," where you can fire for 10–30 seconds without spending a single cent from your balance.</p></div>` },
            { num:'4', title:'AI-Enhanced "Critical Hit" Technology', body:`<p>This is the secret weapon of our platform. We have integrated an AI Hit-Registration Engine into Dinosaur Tycoon.</p><p><strong>The Logic:</strong> In standard arcade games, the "Kill Shot" can feel random.</p><p><strong>The AI Skill:</strong> Our system analyzes your firing rhythm. If the AI detects that you are focusing your fire on a high-value target (like the T-Rex) while managing your heat-meter efficiently, it increases your "Critical Hit" probability by 15%. Our AI rewards "Skilled Hunting" over "Blind Spraying," making our platform the most profitable place for strategic shooters.</p>` },
            { num:'5', title:'Advanced Tactic: The "Double-Tap Lock-On"', body:`<p>The most common mistake beginners make is wasting bullets on small dinosaurs that wander in front of a big target.</p><p><strong>The Pro Move:</strong> On our site, you can Double-Tap a specific dinosaur. This locks your cannon's trajectory, allowing your bullets to pass through or bypass smaller creatures to hit only the big prize.</p><p><strong>AI Optimization:</strong> Our AI "Smart-Lock" ensures that even if the dinosaur moves rapidly across the screen, your cannon tracks it with zero lag, ensuring not a single paid bullet is wasted.</p>` },
            { num:'6', title:'Why Play Dinosaur Tycoon on Our Platform?', body:`<div class="highlight-box"><p><strong>Visual Transparency:</strong> We provide a real-time "Damage Counter" above each dinosaur. You can see exactly how much damage you are dealing, allowing you to decide if a target is worth the remaining bullets in your "magazine."</p><p><strong>Multi-Provider Access:</strong> We host versions from JDB and FA CHAI, giving you access to different "Difficulty Maps." If the jungle is "cold," you can switch to the volcanic map for a fresh RNG seed.</p><p><strong>Instant Wallet Sync:</strong> Unlike other sites where your "Fishing" winnings are stuck in a separate arcade wallet, our site uses Unified Wallet Tech. As soon as that Golden T-Rex falls, those funds are available in your main balance for withdrawal to JazzCash or EasyPaisa.</p></div>` },
            { num:'7', title:'The "Community Bounty" System', body:`<p>Dinosaur Tycoon is a shared world. You see other hunters on the screen with you. Our AI Bounty Tracker identifies "Weakened Giants." If another player has spent 100 bullets on a Mammoth and then leaves the game, our AI flags that Mammoth to you as a high-probability target. It is a "Social Hunting" experience where the smart hunter always wins.</p>` },
        ]
    },
    9: { // DRAGON FORTUNE
        sections: [
            { num:'1', title:'The Core Concept: High-Volatility Boss Hunting', body:`<p>Dragon Fortune is a premium arcade shooting game that elevates the "Fishing" genre into a world of East Asian mythology. Unlike standard games where you clear screens of small fish, Dragon Fortune is designed around Boss Intensity. The screen is dominated by powerful dragons, each carrying a massive multiplier bounty. This is a game of "Precision over Volume" — every shot you fire is an investment into a potential jackpot.</p>` },
            { num:'2', title:'The Elemental Arsenal: Choosing Your Weapon', body:`<div class="highlight-box"><p><strong>The Fire Blast:</strong> The standard rapid-fire mode. Excellent for maintaining your balance by taking out the smaller "Lantern" or "Coin" spirits.</p><p><strong>The Thunder Strike:</strong> A specialized weapon that slows down targets. Use this when a Golden Dragon is moving fast across the screen to ensure your shots land consistently.</p><p><strong>The Dragon Slayer Laser:</strong> This is the most powerful weapon in the game. It consumes a higher stake per shot but has a "Piercing" effect, meaning it can hit multiple dragons in a single line.</p></div>` },
            { num:'3', title:'The "Dragon Breath" Bonus System', body:`<p>Dragon Fortune features a unique Progression Meter. As you slay smaller creatures, you fill the "Dragon Breath" bar at the bottom of the screen.</p><div class="highlight-box"><p><strong>The Awakening:</strong> Once full, the game enters a "Bonus State" where an Ancient Mega Dragon descends.</p><p><strong>The Multiplier Rain:</strong> During this phase, every shot that hits the dragon causes "Golden Scales" to fall. Each scale is an instant multiplier win.</p><p><strong>The Final Blow:</strong> If you are the player to land the killing shot on the Mega Dragon, you trigger the Grand Fortune Wheel, which can pay out up to 1000x your total stake.</p></div>` },
            { num:'4', title:'AI-Enhanced "Weak Point" Detection', body:`<p>This is the exclusive technological edge our platform provides. While the dragons move in patterns, they have "hit boxes" that determine the damage they take.</p><p><strong>The AI Skill:</strong> Our platform integrates a Real-Time Damage Overlay. Our AI monitors the health of every dragon on the screen.</p><p><strong>The Insight:</strong> When a High-Value Dragon has lost 70% of its health (from your shots or other players), our AI highlights the dragon's "Heart" or "Head" with a subtle red glow. This tells you that the "Kill Shot" probability is at its peak. By concentrating your fire during this AI-alerted window, you maximize your chances of securing the final bounty.</p>` },
            { num:'5', title:'Advanced Tactic: The "Sniper Lock" Strategy', body:`<p>Beginners often "Spray and Pray," firing all over the screen. Professionals on our site use the Sniper Lock.</p><p><strong>The Move:</strong> Long-press or double-tap on the highest-value dragon on the screen.</p><p><strong>The AI Edge:</strong> Our "Smart-Track" AI ensures your cannon follows that specific dragon, even if it weaves behind clouds or pillars. More importantly, our AI calculates the "Collision Path", ensuring your bullets don't hit low-value targets that fly in the way, saving you 20–30% in wasted stakes per session.</p>` },
            { num:'6', title:'Why Play Dragon Fortune on Our Platform?', body:`<div class="highlight-box"><p><strong>Unified Jackpot Pool:</strong> Our site links the Dragon Fortune prize pool across all our active hunters. This means the "Grand Jackpot" grows faster here than on any other site, often reaching millions of PKR before it drops.</p><p><strong>Frame-Perfect Registration:</strong> In a shooting game, "Input Lag" is your enemy. We use Low-Latency API integration, ensuring that the microsecond you click "Fire," the damage is registered on the server.</p><p><strong>Instant Wallet Access:</strong> Slain a Dragon for a 500x win? That money is moved from the game to your EasyPaisa or JazzCash withdrawable balance instantly. No "holding periods" or "transfer delays."</p></div>` },
            { num:'7', title:'The AI "Spirit Guide"', body:`<p>Our platform includes a unique AI Spirit Guide notification. If the AI detects that you have been firing for a long time without a big kill, it will suggest a "Cannon Calibration." This resets your game seed and can trigger a "Loyalty Bonus" shot — a free, high-power blast that has a guaranteed multiplier return.</p>` },
        ]
    },
    13: { // ANDAR BAHAR
        sections: [
            { num:'1', title:'The Soul of the Game: Simplicity Meets Velocity', body:`<p>Andar Bahar is a legendary Indian card game that has survived for centuries because of its perfect balance. The game begins with a single card dealt face-up in the center — this is the "Joker" or the "Trump" card. The dealer then deals cards alternately into two piles: Andar (Inside) and Bahar (Outside). The objective is deceptively simple: predict which side will first receive a card that matches the numerical value of the Joker. On our platform, we have eliminated the "wait time" of physical dealers, offering an Instant RNG version where rounds are settled in under 10 seconds.</p>` },
            { num:'2', title:'Understanding the "Lead" Advantage', body:`<p>In Andar Bahar, the math is slightly different depending on the suit of the Joker.</p><div class="highlight-box"><p><strong>The First Move:</strong> If the Joker is a Black suit (Clubs or Spades), the first card is dealt to Andar.</p><p><strong>The Second Move:</strong> If the Joker is a Red suit (Hearts or Diamonds), the first card is dealt to Bahar.</p></div><p>Professional players on our site know that the side receiving the first card has a statistically higher probability (approximately 51.5%) of winning. Our interface highlights the "Leading Side" in gold for every round, ensuring you always know where the mathematical edge lies.</p>` },
            { num:'3', title:'AI-Powered "Bead Plate" Analysis (The Pattern Edge)', body:`<p>This is the feature that makes our website the #1 choice for Andar Bahar enthusiasts. While the cards are random, "streaks" are a mathematical reality.</p><p><strong>The Logic:</strong> In a 50/50 game, seeing "Andar" win seven times in a row is rare, but it happens.</p><p><strong>The AI Skill:</strong> Our platform integrates a Neural-Network Pattern Tracker. It populates a "Bead Plate" (a visual history map) that categorizes the last 100 rounds. Our AI identifies "Zig-Zag" patterns (Andar-Bahar-Andar) and "Long Dragon" patterns (Andar-Andar-Andar). When the AI detects a "Pattern Break" is statistically overdue, it provides a subtle notification, helping you decide when to switch your bet from one side to the other.</p>` },
            { num:'4', title:'Advanced Tactic: The "Side-Bet" Multiplier', body:`<p>Standard betting on Andar or Bahar offers nearly a 1:1 return. To hit the "Big Wins" our site is famous for, you must utilize Side Bets.</p><div class="highlight-box"><p><strong>Card Count Bets:</strong> You can bet on how many cards will be dealt before the match is found (e.g., 1–5 cards, 6–10 cards, or 40+ cards).</p><p><strong>The "Mid-Game" Boost:</strong> Our platform allows you to place Mid-Deal Bets. If 10 cards have passed and the Joker hasn't appeared, the multipliers for the remaining cards skyrocket. Our AI calculates these "Live Odds" in real-time, displaying them on your screen so you can jump in when the reward-to-risk ratio is at its peak.</p></div>` },
            { num:'5', title:'Why Play Andar Bahar on Our Platform?', body:`<div class="highlight-box"><p><strong>Zero-Human Error:</strong> Physical dealers can make mistakes or be slow. Our AI-driven RNG version is governed by a certified algorithm that is audited monthly for 100% fairness.</p><p><strong>Quantum-Speed Results:</strong> For the player who wants to maximize their hourly profit, our "Fast-Fold" Andar Bahar allows you to play up to 400 rounds per hour.</p><p><strong>AI Fraud Protection:</strong> We use SSL Encryption and AI Monitoring to ensure that every deck "shuffle" is cryptographically secure. The result is determined the microsecond you click "Deal," and it is impossible for the system to change the outcome based on your bet size.</p></div>` },
            { num:'6', title:'The "Martingale" Optimization Tool', body:`<p>Because Andar Bahar is a near 50/50 game, many players use the Martingale System (doubling the bet after a loss).</p><p><strong>Our Edge:</strong> Our site features a "One-Tap Double" button and a high table limit specifically designed for Martingale players.</p><p><strong>AI Safeguard:</strong> Our AI tracks your betting progression. If you are on a losing streak and your next doubled bet exceeds your balance, the system will alert you to top up via EasyPaisa or JazzCash instantly, so you never miss the "recovery round" that puts you back in the profit.</p>` },
            { num:'7', title:'Global Player Sentiment', body:`<p>On the right side of the screen, you will see a Live Sentiment Bar. This shows what percentage of all active players are currently betting on Andar vs. Bahar.</p><p><strong>The "Contrarian" Strategy:</strong> Many of our top earners use this AI-fed data to bet against the crowd during long streaks, capitalized on the "Regression to the Mean" theory.</p>` },
        ]
    },
    14: { // MINES
        sections: [
            { num:'1', title:'The Core Concept: Digital Minefield Navigation', body:`<p>Mines is a high-tension game played on a 5x5 grid containing 25 face-down tiles. Hidden beneath these tiles are two things: Diamonds (which increase your multiplier) and Mines (which end the round and reset your stake). The brilliance of Mines lies in its customization; before the round starts, you choose how many mines (from 1 to 24) are hidden in the grid. The more mines you add, the faster your multiplier skyrockets with every diamond you find.</p>` },
            { num:'2', title:'The Multiplier Math: Understanding the Curves', body:`<p>To win consistently on our site, you must understand the "Volatility Switch."</p><div class="highlight-box"><p><strong>The "Safe" Strategy (1–3 Mines):</strong> You can open many tiles before the risk becomes high. This is perfect for "Scalping" — taking small 1.2x or 1.5x wins repeatedly to build a massive daily total.</p><p><strong>The "Aggressive" Strategy (10–15 Mines):</strong> Just two or three diamonds can result in a 10x to 20x return.</p><p><strong>The "Extreme" Strategy (20+ Mines):</strong> Opening just one or two tiles can pay out 50x or 100x. Our platform displays the "Next Tile Value" in real-time, so you always know exactly what you are playing for.</p></div>` },

// ── INIT ─────────────────────────────────────────────────────────────────────
function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
}

window.onload = function() {
    const id = parseInt(getParam('id')) || 1;
    const game = allGames.find(g => g.id === id) || allGames[0];

    // Hero
    document.title = 'Baji — ' + game.name;
    document.getElementById('game-icon').src = game.img;
    document.getElementById('game-icon').alt = game.name;
    document.getElementById('game-title').textContent = game.name;
    document.getElementById('game-tagline').textContent = game.tagline;

    // Article
    const data = articles[id] || defaultArticle(game.name);
    const wrap = document.getElementById('article-content');
    data.sections.forEach(sec => {
        const div = document.createElement('div');
        div.className = 'section-block';
        div.innerHTML = `<div class="section-number">Section ${sec.num}</div><div class="section-title">${sec.title}</div><div class="section-body">${sec.body}</div>`;
        wrap.appendChild(div);
    });

    // More Games (exclude current)
    const moreGrid = document.getElementById('more-grid');
    const others = allGames.filter(g => g.id !== id).sort(() => Math.random() - 0.5).slice(0, 8);
    others.forEach(g => {
        const a = document.createElement('a');
        a.className = 'more-card';
        a.href = 'game.html?id=' + g.id;
        a.innerHTML = `<img src="${g.img}" alt="${g.name}" loading="lazy"><div class="more-card-name">${g.name}</div>`;
        moreGrid.appendChild(a);
    });
};
</script>
