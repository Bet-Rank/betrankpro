        { n:'3', t:'The "Streak" Multiplier: The Power of Momentum', b:`<div class="highlight-box"><p><strong>Level 1:</strong> 1.9x Multiplier.</p><p><strong>Level 2:</strong> 3.8x Multiplier.</p><p><strong>Level 3:</strong> 7.5x Multiplier.</p><p><strong>Level 5 (The Grand Slam):</strong> Can reach up to 32x your stake.</p></div><p>Our platform allows you to "Cash Out" at any level. If you score three goals and feel the Goalkeeper AI is "warming up," you can take your 7.5x profit and reset the game seed for a fresh start.</p>` },
        { n:'4', t:'AI-Enhanced "Goalkeeper Pattern Recognition"', b:`<p>Our platform provides a "Live Dive Tracker." Our AI analyzes the last 20 saves made by the keeper. If the AI sees that the keeper has dived "Right" four times in a row, it calculates an 82% probability that the next dive will be "Left" or "Center." We highlight the "High-Probability Scoring Zone" in a subtle green glow.</p>` },
        { n:'5', t:'Advanced Tactic: The "Hedge-Shot" Strategy', b:`<div class="highlight-box"><p><strong>The Entry:</strong> Place a base bet (e.g., 500 PKR) and aim for the bottom-left corner.</p><p><strong>The Lock-In:</strong> Once you hit 1.9x, you have nearly doubled your money.</p><p><strong>The Profit Play:</strong> You "Collect" 400 PKR and leave 100 PKR as a "running bet" for a high-risk top-corner shot. Our AI Bankroll Assistant calculates these splits for you automatically.</p></div>` },
        { n:'6', t:'Why Play Football Manager Here?', b:`<div class="highlight-box"><p><strong>Instant-Settle Technology:</strong> The moment the net ripples, your balance is updated. You can move from a winning goal to an EasyPaisa withdrawal in under 60 seconds.</p><p><strong>Zero-Latency Controls:</strong> Our servers use Edge-Computing, ensuring your "Aim and Click" is frame-perfect.</p><p><strong>AI Reality Check:</strong> If you are on a losing streak, our AI sends a "Tactical Substitution" alert to help you break out of a psychological "rut."</p></div>` },
        { n:'7', t:'The "Golden Ball" Jackpot', b:`<p>Randomly, our AI will turn the match ball into a "Golden Ball." If you score with this ball, the multiplier for that specific shot is doubled (e.g., a 10x top-corner shot becomes a 20x instant win). This is our way of rewarding loyal players who spend time mastering the pitch.</p>` },
    ]},
    4: { sections: [
        { n:'1', t:'The Core Concept: The Infinite Boundary', b:`<p>Cricket X is a "Crash" game designed with the soul of a T20 match. A batsman steps up to the crease and smashes a ball into the sky. As the ball travels further and higher into the atmosphere, the win multiplier climbs. Your goal is to "Cash Out" your winnings while the ball is still in flight. It's a game of nerves that captures the exact tension of a last-ball finish.</p>` },
        { n:'2', t:'The Mechanics: From the Pitch to the Stratosphere', b:`<div class="highlight-box"><p><strong>The Launch:</strong> You place your bet before the bowler delivers. As soon as the bat hits the ball, the multiplier starts at 1.00x.</p><p><strong>The Climb:</strong> The ball passes the stadium lights, the clouds, and eventually reaches outer space.</p><p><strong>The Ejection:</strong> You must click the "Cash Out" button before the ball pops. If you wait too long and the ball bursts, your stake is lost.</p></div>` },
        { n:'3', t:'AI-Enhanced "Batting Average" Analytics', b:`<p>Our platform integrates an AI-Predictive Scoreboard. The AI analyzes the last 100 "hits" and identifies the current "Pitch Condition" (the volatility state of the RNG). If the last five balls have burst below 1.20x, our AI highlights the "Green Zone" (the 2x to 5x range) as a high-probability recovery area.</p>` },
        { n:'4', t:'Advanced Tactic: The "Powerplay" Dual-Bet', b:`<div class="highlight-box"><p><strong>Bet 1 (The Single):</strong> Place a larger bet and set an Auto-Cashout at 1.50x. This is your "Base Score" to ensure you don't lose your principal.</p><p><strong>Bet 2 (The Six):</strong> Place a smaller bet with no Auto-Cashout. Let this ball fly into the "Space Zone" (50x+) to chase the massive jackpot.</p></div><p>Our AI Bankroll Manager calculates the perfect ratio between your "Single" and your "Six."</p>` },
        { n:'5', t:'Why Play Cricket X on Our Platform?', b:`<div class="highlight-box"><p><strong>Instant Replay Transparency:</strong> Every flight is cryptographically hashed. You can verify the "Burst Point" after every round.</p><p><strong>Sub-Second Execution:</strong> Our platform uses High-Velocity WebSockets, ensuring that the moment you click "Cash Out," the multiplier is locked in.</p><p><strong>Mobile-First "Swipe-to-Win":</strong> Trigger your cash-out with a simple thumb-press, optimized for high-pressure moments when the multiplier hits 100x.</p></div>` },
        { n:'6', t:'The "Stadium Crowd" Social Pulse', b:`<p>Cricket X is a social experience. On the left of the screen, you see the Live Leaderboard. Our AI flags "Big Hitters" — players who are consistently cashing out at high multipliers. If the top players are staying in for the 10x mark, it's a strong AI-backed signal that the current game seed is in a "Stable Flight" cycle.</p>` },
        { n:'7', t:'Instant Payouts: From the Boundary to the Bank', b:`<p>Hit a massive 500x space-shot? Our Direct-to-Wallet API moves your winnings into your EasyPaisa or JazzCash account instantly. We provide the fastest withdrawal system for Cricket X in the market.</p>` },
    ]},
    5: { sections: [
        { n:'1', t:'The Core Concept: The Galaxy\'s Infinite Multiplier', b:`<p>JetX is an "Instant Crash" game set at a futuristic spaceport. A pixel-art jet takes off from the runway, and as it climbs into the stratosphere and eventually into deep space, the multiplier increases. JetX is famous for its "Infinite Ceiling" — it is mathematically capable of reaching 10,000x or even 50,000x. On our platform, JetX isn't just a game; it's an endurance test of your nerves.</p>` },
        { n:'2', t:'The Multi-Bet Dashboard: Tactical Redundancy', b:`<div class="highlight-box"><p><strong>Bet A (The Foundation):</strong> Place a large bet (e.g., 2,000 PKR) and set the Auto-Cashout at 1.35x. This covers your total stake for the round.</p><p><strong>Bet B (The Moonshot):</strong> Place a small bet (e.g., 200 PKR) and disable Auto-Cashout. Let this fly until the jet enters the "Dark Space" zone (usually 20x+).</p></div><p>Even if the jet explodes at 1.5x, you walk away with a small profit from Bet A. If it reaches 50x, your Bet B turns a tiny stake into a massive EasyPaisa withdrawal.</p>` },
        { n:'3', t:'AI-Enhanced "Explosion-Zone" Analytics', b:`<p>While the crash point is random, digital RNGs often move in "Volatility Waves." After a "Galaxy Crash" (anything over 100x), the game often goes through a "Re-Stabilization" phase. When the jet passes 2.0x, the AI displays a "Survival Chance" percentage. If the AI detects a high-volatility wave, it will flash the Cashout button in a "Warning Red."</p>` },
        { n:'4', t:'The "Galaxy Jackpot" (The AI Reward System)', b:`<div class="highlight-box"><p><strong>How it Works:</strong> A small percentage of every bet made on our platform goes into a communal pool.</p><p><strong>The Trigger:</strong> The Jackpot is awarded randomly, but only to players who have a running bet when the jet reaches a specific altitude (usually 1.5x or higher).</p><p><strong>AI Selection:</strong> Our AI monitors player consistency. Players who use "Smart Betting" are prioritized for "Jackpot Alerts."</p></div>` },
        { n:'5', t:'Advanced Tactic: The "Anti-Gravity" Martingale', b:`<div class="highlight-box"><p><strong>The Base:</strong> Start with a small bet.</p><p><strong>The Streak:</strong> If you win, triple your bet for the next round but lower your Cashout target.</p><p><strong>The Logic:</strong> You are using the "House Money" to chase the momentum. Our AI Profit-Lock feature automatically banks 50% of the profit to your JazzCash wallet before the next flight.</p></div>` },
        { n:'6', t:'Why Play JetX on Our Platform?', b:`<div class="highlight-box"><p><strong>High-Definition Pixel Sync:</strong> We have optimized the JetX engine to run with Zero Frame-Drop.</p><p><strong>Global Pilot Chat:</strong> Our site features a Live Chat and Bet-Tracker. You can see exactly when the "Whales" (big bettors) eject.</p><p><strong>AI Sentiment Analysis:</strong> Our sidebar shows a "Fear vs. Greed" index. If the index is 90% "Fear," this is often the best time to "Go Long."</p></div>` },
        { n:'7', t:'Instant Multi-Wallet Support', b:`<p>Whether you use EasyPaisa, JazzCash, or USDT, your JetX credits are converted to real currency and sent to your account with a single click in the "Withdraw" menu.</p>` },
    ]},
    6: { sections: [
        { n:'1', t:'The Core Concept: A Digital Path to the Back of the Net', b:`<p>Goal is an instant-win game where you navigate a football across a field divided into vertical columns. Each column represents a step closer to the "Goal." Inside each column are hidden tiles — some contain a Football (Success), and one contains a Bomb (Loss). Every successful step increases your multiplier. If you reach the final column and score, you hit the maximum jackpot for that round.</p>` },
        { n:'2', t:'Choosing Your Field: The Three Difficulty Levels', b:`<div class="highlight-box"><p><strong>Small Field (3x4 Grid) — The "Sprint":</strong> Fewest columns, reach the goal faster, multipliers grow more modestly.</p><p><strong>Medium Field (4x7 Grid) — The "Midfield Battle":</strong> Balanced experience with a longer path and higher potential rewards.</p><p><strong>Big Field (5x10 Grid) — The "World Cup Final":</strong> The longest path, but it features the highest multipliers. Reaching the end can turn a small stake into a life-changing payout.</p></div>` },
        { n:'3', t:'The "Advantage Rule": Cashing Out at Any Step', b:`<p>The most powerful feature of Goal on our site is the Instant Cash-Out. You do not have to reach the goal to win. If you feel a "Bomb" is coming in the next column, you can click the "Cash Out" button and your winnings are instantly moved to your EasyPaisa or JazzCash balance.</p>` },
        { n:'4', t:'AI-Enhanced "Explosive-Detection" Technology', b:`<p>Our platform integrates an AI Probability Mapper. Our system monitors the last 100 rounds and displays a "Safe-Step Indicator." As you hover over a tile, the AI calculates the historical frequency of bombs in that specific coordinate. If a certain tile has been "Clean" for 10 rounds, our AI highlights it with a subtle green aura.</p>` },
        { n:'5', t:'Advanced Tactic: The "Zig-Zag" Maneuver', b:`<p>Our backend AI analysis has shown that the RNG often distributes bombs in "Vertical Clusters." Professional Goal players rarely click tiles in a straight line. They use the Zig-Zag Pattern (e.g., Row 1, Column 1 → Row 3, Column 2 → Row 5, Column 3). This pattern effectively "breaks" the vertical clustering of the RNG, increasing your chances of finding the clear path.</p>` },
        { n:'6', t:'Why Play Goal on Our Platform?', b:`<div class="highlight-box"><p><strong>Zero-Input Lag:</strong> Our site is optimized for Zero-Latency, ensuring that the tile you click is exactly the tile that opens.</p><p><strong>Instant Wallet Integration:</strong> We process JazzCash and EasyPaisa transactions faster than any other platform in the market.</p><p><strong>Provably Fair Verification:</strong> After every match, you can check the Game Hash to prove the location of bombs was determined before the first kick.</p></div>` },
        { n:'7', t:'The "Golden Goal" Bonus', b:`<p>Randomly, our AI will trigger a "Golden Goal" round. During this special event, the multipliers for reaching the final column are doubled. If you have been playing consistently and showing "Disciplined Growth," our AI is more likely to trigger this bonus for you, turning a standard win into a legendary one.</p>` },
    ]},
    7: { sections: [
        { n:'1', t:'The Core Concept: The Sky is the Limit', b:`<p>The game begins with Magnify Man preparing for takeoff in a high-tech city. As he begins his flight, a multiplier starts at 1.00x and climbs rapidly. The Goal: Hit the "Cash Out" button before the hero disappears or "crashes" mid-flight. If you cash out at 50.00x with a 100 PKR bet, you instantly win 5,000 PKR.</p>` },
        { n:'2', t:'Dual-Betting: The "Hero & Sidekick" Strategy', b:`<div class="highlight-box"><p><strong>The Safe Bet:</strong> Set one bet to "Auto Cash-Out" at 1.50x - 2.00x. This covers your initial stake.</p><p><strong>The Legend Bet:</strong> Leave the second bet manual. This is your "Moonshot" bet. Let it run to 10x, 50x, or even 100x while your first bet has already secured your profit.</p></div>` },
        { n:'3', t:'The "AI-Flyer" Strategy: Reading the Velocity', b:`<p><strong>The "Short-Flight" Reset:</strong> If the hero crashes three times in a row below 1.20x, our 2026 data indicates a "Power Flight" (above 10x) is statistically more likely to occur soon.</p><p><strong>The "City Heights" Logic:</strong> Use the background buildings as a visual guide. Many players find it easier to time their cash-outs based on how high the hero is relative to the skyscrapers, rather than just staring at the numbers.</p>` },
        { n:'4', t:'Why Play Magnify Man on Baji?', b:`<div class="highlight-box"><p><strong>Stunning Visuals:</strong> Unlike the simple red line of Aviator, Magnify Man feels like a high-end mobile game. The animations are smooth, even on slower 4G/5G connections in Pakistan.</p><p><strong>Massive Jackpot:</strong> Magnify Man has one of the highest maximum multipliers in the crash genre, reaching up to 10,000x. A single 10 PKR bet could theoretically turn into 100,000 PKR.</p><p><strong>Social Stats:</strong> On the left side of the Baji screen, you can see real-time "Hero Stats" — how many people are currently flying and at what multiplier they are cashing out.</p></div>` },
        { n:'5', t:'Magnify Man vs. Aviator', b:`<p>Aviator is a social "community" game where everyone sees the same plane. Magnify Man is a solo-focused experience with much higher "Flash Graphics." It's designed for the player who wants a more immersive, "Marvel-style" gaming experience with a potentially higher ceiling of 10,000x.</p>` },
        { n:'6', t:'The "Power Boost" Feature', b:`<p>On certain Baji promotional days, Magnify Man includes a "Power Boost" where the multiplier climbs 20% faster than usual. Keep an eye on your Baji notifications — playing during these "Boost Hours" significantly increases your hourly ROI (Return on Investment).</p>` },
        { n:'7', t:'Auto-Play Mastery & Bankroll Protection', b:`<p>Set your "Total Loss Limit" in the settings. This ensures that even if you have a bad run of luck, the game will stop automatically, protecting your bankroll for the next day. This is the single most important feature for long-term profitability on Magnify Man.</p>` },
    ]},
    8: { sections: [
        { n:'1', t:'The Core Concept: Action-Based Multipliers', b:`<p>Dinosaur Tycoon is a "Shooting" or "Fishing" style game that trades the stress of a crashing plane for the adrenaline of a jungle hunt. You buy "bullets." Each bullet has a value (your stake), and every dinosaur on the screen has a specific health bar and a corresponding multiplier. When a dinosaur falls under your fire, you receive your bullet value multiplied by that dinosaur's worth.</p>` },
        { n:'2', t:'The Arsenal: Strategic Weapon Selection', b:`<div class="highlight-box"><p><strong>The Standard Cannon:</strong> Best for clearing "Small Fry" like Raptors or Pterodactyls to keep your balance ticking upward.</p><p><strong>The Lightning Chain:</strong> Strikes one dinosaur and chains to three others nearby. The most efficient way to clear a crowded screen.</p><p><strong>The Heavy Artillery (Laser):</strong> Consumes more credits per shot but deals massive damage. Professional players save this exclusively for the "Boss" dinosaurs.</p></div>` },
        { n:'3', t:'The "Big Three" High-Value Targets', b:`<div class="highlight-box"><p><strong>The Golden T-Rex:</strong> Taking him down triggers the Golden Prize Wheel, which can multiply your total round winnings by up to 500x.</p><p><strong>The Mammoths &amp; Triceratops:</strong> "Tank" dinosaurs that act as "walking multipliers" that leak coins every time you hit them, even before they die.</p><p><strong>The Special Eggs:</strong> Occasionally, glowing eggs appear. Breaking these triggers "Free Bullet Mode," where you can fire for 10–30 seconds without spending a single cent from your balance.</p></div>` },
        { n:'4', t:'AI-Enhanced "Critical Hit" Technology', b:`<p>Our system analyzes your firing rhythm. If the AI detects that you are focusing your fire on a high-value target (like the T-Rex) while managing your heat-meter efficiently, it increases your "Critical Hit" probability by 15%. Our AI rewards "Skilled Hunting" over "Blind Spraying."</p>` },
        { n:'5', t:'Advanced Tactic: The "Double-Tap Lock-On"', b:`<p>On our site, you can Double-Tap a specific dinosaur. This locks your cannon's trajectory, allowing your bullets to pass through or bypass smaller creatures to hit only the big prize. Our AI "Smart-Lock" ensures that even if the dinosaur moves rapidly across the screen, your cannon tracks it with zero lag.</p>` },
        { n:'6', t:'Why Play Dinosaur Tycoon on Our Platform?', b:`<div class="highlight-box"><p><strong>Visual Transparency:</strong> We provide a real-time "Damage Counter" above each dinosaur.</p><p><strong>Multi-Provider Access:</strong> We host versions from JDB and FA CHAI, giving you access to different "Difficulty Maps."</p><p><strong>Instant Wallet Sync:</strong> As soon as that Golden T-Rex falls, those funds are available in your main balance for withdrawal to JazzCash or EasyPaisa.</p></div>` },
        { n:'7', t:'The "Community Bounty" System', b:`<p>Dinosaur Tycoon is a shared world. Our AI Bounty Tracker identifies "Weakened Giants." If another player has spent 100 bullets on a Mammoth and then leaves the game, our AI flags that Mammoth to you as a high-probability target. It is a "Social Hunting" experience where the smart hunter always wins.</p>` },
    ]},
    9: { sections: [
        { n:'1', t:'The Core Concept: High-Volatility Boss Hunting', b:`<p>Dragon Fortune is a premium arcade shooting game that elevates the "Fishing" genre into a world of East Asian mythology. The screen is dominated by powerful dragons, each carrying a massive multiplier bounty. This is a game of "Precision over Volume" — every shot you fire is an investment into a potential jackpot.</p>` },
        { n:'2', t:'The Elemental Arsenal: Choosing Your Weapon', b:`<div class="highlight-box"><p><strong>The Fire Blast:</strong> Standard rapid-fire mode. Excellent for maintaining your balance by taking out smaller "Lantern" or "Coin" spirits.</p><p><strong>The Thunder Strike:</strong> Slows down targets. Use this when a Golden Dragon is moving fast across the screen.</p><p><strong>The Dragon Slayer Laser:</strong> Has a "Piercing" effect, meaning it can hit multiple dragons in a single line.</p></div>` },
        { n:'3', t:'The "Dragon Breath" Bonus System', b:`<div class="highlight-box"><p><strong>The Awakening:</strong> Once the Dragon Breath bar is full, the game enters a "Bonus State" where an Ancient Mega Dragon descends.</p><p><strong>The Multiplier Rain:</strong> During this phase, every shot that hits the dragon causes "Golden Scales" to fall. Each scale is an instant multiplier win.</p><p><strong>The Final Blow:</strong> If you land the killing shot on the Mega Dragon, you trigger the Grand Fortune Wheel, which can pay out up to 1000x your total stake.</p></div>` },
        { n:'4', t:'AI-Enhanced "Weak Point" Detection', b:`<p>When a High-Value Dragon has lost 70% of its health, our AI highlights the dragon's "Heart" or "Head" with a subtle red glow. This tells you that the "Kill Shot" probability is at its peak. By concentrating your fire during this AI-alerted window, you maximize your chances of securing the final bounty.</p>` },
        { n:'5', t:'Advanced Tactic: The "Sniper Lock" Strategy', b:`<p>Long-press or double-tap on the highest-value dragon on the screen. Our "Smart-Track" AI ensures your cannon follows that specific dragon, even if it weaves behind clouds or pillars. Our AI calculates the "Collision Path," ensuring your bullets don't hit low-value targets that fly in the way, saving you 20–30% in wasted stakes per session.</p>` },
        { n:'6', t:'Why Play Dragon Fortune on Our Platform?', b:`<div class="highlight-box"><p><strong>Unified Jackpot Pool:</strong> Our site links the Dragon Fortune prize pool across all our active hunters, often reaching millions of PKR before it drops.</p><p><strong>Frame-Perfect Registration:</strong> We use Low-Latency API integration, ensuring that the microsecond you click "Fire," the damage is registered on the server.</p><p><strong>Instant Wallet Access:</strong> Slain a Dragon for a 500x win? That money is moved to your EasyPaisa or JazzCash withdrawable balance instantly.</p></div>` },
        { n:'7', t:'The AI "Spirit Guide"', b:`<p>If the AI detects that you have been firing for a long time without a big kill, it will suggest a "Cannon Calibration." This resets your game seed and can trigger a "Loyalty Bonus" shot — a free, high-power blast that has a guaranteed multiplier return.</p>` },
    ]},
    10: { sections: [
        { n:'1', t:'The Core Concept: Shoot to Win', b:`<p>In Happy Fishing, you are placed in an underwater world filled with different species of sea creatures. Your "Bet" is your "Bullet." Every shot you fire costs a small amount of your balance. When you successfully "kill" a fish, you receive a payout based on that fish's specific multiplier.</p><div class="highlight-box"><p><strong>Small Fish:</strong> Easy to kill, low payout (2x – 10x).</p><p><strong>Big Fish:</strong> Harder to kill, high payout (20x – 100x).</p><p><strong>Mega Bosses:</strong> Take significant ammo but can return 1000x or more.</p></div>` },
        { n:'2', t:'The Weaponry: Choose Your Power', b:`<div class="highlight-box"><p><strong>Standard Cannon:</strong> Good for clearing small schools of fish.</p><p><strong>Power Cannon:</strong> Uses more balance per shot but has a higher "Capture Rate."</p><p><strong>Special Weapons:</strong> Occasionally, you will unlock Torpedoes or Electric Nets that can clear the entire screen. Pro-Tip: Save these for when a Boss appears!</p></div>` },
        { n:'3', t:'The "AI-Hunter" Strategy: How to Profit', b:`<p><strong>The "Fresh Fish" Rule:</strong> Fish entering the screen from the edges often have a higher "Fragility" — they die faster. Aim for fish the second they appear.</p><p><strong>The "Moustache" Technique:</strong> Use your cannon to "graze" the edges of a group. This allows you to kill multiple small fish with the same bullet trail, ensuring your "Ammo Cost" is always covered.</p><p><strong>Target the "Special" Fish:</strong> Look for fish carrying Drill Bombs or Lightning Hooks. Killing these triggers a chain reaction that kills every other fish nearby for free.</p>` },
        { n:'4', t:'Boss Highlights: The Big Payouts', b:`<div class="highlight-box"><p><strong>The Giant Anglerfish:</strong> High health, but a guaranteed massive multiplier.</p><p><strong>The Mega Octopus:</strong> Capturing this boss triggers a "Wheel of Fortune" where you can multiply your final kill reward by up to 10x.</p><p><strong>The Immortal Dragon:</strong> The ultimate prize. Wait until the Dragon is halfway across the screen before you start your "Power Shots" — let other players waste their ammo first!</p></div>` },
        { n:'5', t:'Why Play Happy Fishing on Baji?', b:`<div class="highlight-box"><p><strong>Multiplayer Competition:</strong> You play in a room with 3 other players. You can see their strategy and even "steal" their kills if you time your last shot perfectly.</p><p><strong>Auto-Lock Feature:</strong> Baji's interface includes a "Lock-On" button. This ensures your cannon follows a specific high-value target even if smaller fish swim in front of it.</p><p><strong>Instant Wallet Sync:</strong> If you hit a 500x Shark, you can exit the game and withdraw that profit to EasyPaisa immediately.</p></div>` },
        { n:'6', t:'Technical Tip: Check Your Ping', b:`<p>Because Happy Fishing is a "Real-Time" action game, any lag can cause you to miss a shot. Our platform's servers are optimized for South Asian users, providing a less than 50ms latency. This means when you see a fish, your bullet hits it instantly — giving you a 15% better capture rate than on slower, unoptimized sites.</p>` },
    ]},
    11: { sections: [
        { n:'1', t:'The Core Concept: Total Annihilation', b:`<p>In Bombing Fishing, you aren't just shooting bullets; you are deploying explosive charges. The goal is to trigger "Chain Reactions." When one high-value target explodes, it takes out nearby fish, giving you multiple payouts for the cost of a single shot. Payouts can range from a simple 2x to a staggering 1200x during the Golden Shark events.</p>` },
        { n:'2', t:'The Weaponry: From Bullets to Bombs', b:`<div class="highlight-box"><p><strong>The Depth Charge:</strong> A standard shot that has a small blast radius.</p><p><strong>Nuclear Bomb:</strong> Clears a huge portion of the screen. Save this for when the screen is "Crowded" with mid-tier fish.</p><p><strong>The Drill:</strong> Shooting the Drill Fish launches a drill that bounces around the screen, killing everything in its path before finally exploding for a massive finish.</p></div>` },
        { n:'3', t:'The "AI-Demolition" Strategy: Strategic Blasting', b:`<p><strong>The "Bounce" Trick:</strong> Use the edges of the screen. Your explosives can bounce off the walls to hit targets hiding behind smaller schools of fish.</p><p><strong>The "Health Bar" Observation:</strong> If you see a Big Boss that other players have been shooting at, wait for its movement to slow down — this is a "Signal" that its health is low. Step in and "steal" the kill with a high-power bomb.</p><p><strong>Focus on the "Gold" Species:</strong> Gold-plated fish have a 25% higher explosive yield and a significantly larger blast radius.</p>` },
        { n:'4', t:'Special Features: The Reward Chests', b:`<div class="highlight-box"><p><strong>Bronze, Silver, and Gold Chests:</strong> These don't just give coins; they often contain "Free Bomb" power-ups.</p><p><strong>The Bounty System:</strong> As you play, you fill a "Bounty Meter." Once full, the game triggers a Free Game Round where your ammo costs zero for a limited time. This is where the most profit is made!</p></div>` },
        { n:'5', t:'Why Play Bombing Fishing on Baji?', b:`<div class="highlight-box"><p><strong>High Refresh Rate:</strong> Baji's technical setup ensures that the explosions happen in "Real-Time." There is no lag between your click and the blast.</p><p><strong>Room Variety:</strong> Choose from "Newbie," "Expert," and "Royal" rooms. Start in the Newbie room to learn the blast patterns without risking a large balance.</p><p><strong>Auto-Fire Mode:</strong> You can set the game to only target "Bosses" or "Special Fish," allowing the AI to handle ammo management for you.</p></div>` },
        { n:'6', t:'The "Golden Shark" Event', b:`<p>Periodically, the screen will turn red, and the Golden Shark will enter. Switch to your highest power setting immediately. The Golden Shark is a "Community Boss" — everyone in the room helps kill it, but the player who delivers the most damage gets the biggest share of the 600x - 1200x bounty.</p>` },
    ]},
    12: { sections: [
        { n:'1', t:'The Core Concept: Bigger Targets, Bigger Rewards', b:`<p>Mega Fishing shifts the focus away from small schools of fish and onto Elite Species and Legendary Bosses. While the small fish are still there to help you maintain your balance, the real money is made by focusing your fire on the high-value targets. Standard big fish offer 50x - 150x, while the Mega Bosses can reach up to 1000x your bullet cost.</p>` },
        { n:'2', t:'The Weaponry: Precision & Power', b:`<div class="highlight-box"><p><strong>Torpedoes:</strong> High-damage projectiles that ignore small fish and strike only your locked target.</p><p><strong>Railgun:</strong> A piercing beam that damages everything in a straight line. Pro-Tip: Line up multiple big fish to get 3x the value for one shot.</p><p><strong>Thunderbolt:</strong> Randomly triggered, this weapon electrocutes a large area, slowing down bosses and making them easier to "Capture."</p></div>` },
        { n:'3', t:'The "AI-Stamina" Strategy: The Finisher\'s Edge', b:`<p><strong>The "Weak Spot" Mechanic:</strong> Mega Bosses often have visual cues when their health is low. Our AI analysis suggests increasing your "Bet Power" the moment a boss enters its final 25% of health to ensure you get the killing blow.</p><p><strong>Kill Stealing:</strong> In a multiplayer room, watch the other three players. If they are all focusing on one Giant Octopus, wait until it is about to die, then spam your High-Power Torpedoes to snatch the 500x win.</p>` },
        { n:'4', t:'Boss Highlights: The Kings of the Deep', b:`<div class="highlight-box"><p><strong>The Giant Prize Anglerfish:</strong> Capturing this boss often triggers a "Multiplier Wheel" that can turn a 50x win into a 500x win instantly.</p><p><strong>The Mega Crocodile:</strong> A slow-moving Community Boss. The player with the most "Damage Dealt" gets the Lion's share.</p><p><strong>Awakened Bosses:</strong> Occasionally, a standard boss will "Awaken" into a Golden version. Drop everything else and focus all your fire here.</p></div>` },
        { n:'5', t:'Why Play Mega Fishing on Baji?', b:`<div class="highlight-box"><p><strong>Elite Rooms:</strong> Baji offers specialized "High-Roller" rooms for Mega Fishing where the "Capture Rate" for bosses is statistically improved.</p><p><strong>Visual Clarity:</strong> On our platform, the 3D graphics are optimized for mobile. You can clearly see the "Health Cues" of the fish.</p><p><strong>Global Leaderboards:</strong> Baji tracks the biggest Mega Fishing wins daily. If you make it to the top of the board, you often receive "Bonus Credits" or free ammo as a reward.</p></div>` },
        { n:'6', t:'The "Frozen" Tactic', b:`<p>Mega Fishing includes a Freeze power-up. Do not use Freeze on small fish. Only use it when a Mega Boss is about to leave the screen. Freezing it gives you an extra 5–10 seconds of concentrated fire, often making the difference between a total loss and a 1000x jackpot.</p>` },

    13: { sections: [
        { n:'1', t:'The Soul of the Game: Simplicity Meets Velocity', b:`<p>Andar Bahar is a legendary Indian card game that has survived for centuries because of its perfect balance. The game begins with a single card dealt face-up in the center — this is the "Joker" or the "Trump" card. The dealer then deals cards alternately into two piles: Andar (Inside) and Bahar (Outside). On our platform, we offer an Instant RNG version where rounds are settled in under 10 seconds.</p>` },
        { n:'2', t:'Understanding the "Lead" Advantage', b:`<div class="highlight-box"><p><strong>The First Move:</strong> If the Joker is a Black suit (Clubs or Spades), the first card is dealt to Andar.</p><p><strong>The Second Move:</strong> If the Joker is a Red suit (Hearts or Diamonds), the first card is dealt to Bahar.</p></div><p>Professional players know that the side receiving the first card has a statistically higher probability (approximately 51.5%) of winning. Our interface highlights the "Leading Side" in gold for every round.</p>` },
        { n:'3', t:'AI-Powered "Bead Plate" Analysis (The Pattern Edge)', b:`<p>Our platform integrates a Neural-Network Pattern Tracker. It populates a "Bead Plate" (a visual history map) that categorizes the last 100 rounds. Our AI identifies "Zig-Zag" patterns (Andar-Bahar-Andar) and "Long Dragon" patterns (Andar-Andar-Andar). When the AI detects a "Pattern Break" is statistically overdue, it provides a subtle notification.</p>` },
        { n:'4', t:'Advanced Tactic: The "Side-Bet" Multiplier', b:`<div class="highlight-box"><p><strong>Card Count Bets:</strong> You can bet on how many cards will be dealt before the match is found (e.g., 1–5 cards, 6–10 cards, or 40+ cards).</p><p><strong>The "Mid-Game" Boost:</strong> Our platform allows you to place Mid-Deal Bets. If 10 cards have passed and the Joker hasn't appeared, the multipliers for the remaining cards skyrocket. Our AI calculates these "Live Odds" in real-time.</p></div>` },
        { n:'5', t:'Why Play Andar Bahar on Our Platform?', b:`<div class="highlight-box"><p><strong>Zero-Human Error:</strong> Our AI-driven RNG version is governed by a certified algorithm that is audited monthly for 100% fairness.</p><p><strong>Quantum-Speed Results:</strong> Our "Fast-Fold" Andar Bahar allows you to play up to 400 rounds per hour.</p><p><strong>AI Fraud Protection:</strong> We use SSL Encryption and AI Monitoring to ensure that every deck "shuffle" is cryptographically secure.</p></div>` },
        { n:'6', t:'The "Martingale" Optimization Tool', b:`<p>Our site features a "One-Tap Double" button and a high table limit specifically designed for Martingale players. Our AI tracks your betting progression. If you are on a losing streak and your next doubled bet exceeds your balance, the system will alert you to top up via EasyPaisa or JazzCash instantly.</p>` },
        { n:'7', t:'Global Player Sentiment', b:`<p>On the right side of the screen, you will see a Live Sentiment Bar showing what percentage of all active players are currently betting on Andar vs. Bahar. The "Contrarian" Strategy: Many of our top earners use this AI-fed data to bet against the crowd during long streaks, capitalizing on the "Regression to the Mean" theory.</p>` },
    ]},
    14: { sections: [
        { n:'1', t:'The Core Concept: Digital Minefield Navigation', b:`<p>Mines is a high-tension game played on a 5x5 grid containing 25 face-down tiles. Hidden beneath these tiles are two things: Diamonds (which increase your multiplier) and Mines (which end the round and reset your stake). Before the round starts, you choose how many mines (from 1 to 24) are hidden in the grid. The more mines you add, the faster your multiplier skyrockets with every diamond you find.</p>` },
        { n:'2', t:'The Multiplier Math: Understanding the Curves', b:`<div class="highlight-box"><p><strong>The "Safe" Strategy (1–3 Mines):</strong> Perfect for "Scalping" — taking small 1.2x or 1.5x wins repeatedly to build a massive daily total.</p><p><strong>The "Aggressive" Strategy (10–15 Mines):</strong> Just two or three diamonds can result in a 10x to 20x return.</p><p><strong>The "Extreme" Strategy (20+ Mines):</strong> Opening just one or two tiles can pay out 50x or 100x. Our platform displays the "Next Tile Value" in real-time.</p></div>` },
        { n:'3', t:'AI-Enhanced "Probability Overlay"', b:`<p>Our interface features a "Live Safety Percentage." If you have 20 tiles left and 1 mine, the AI shows a 95% Safety Rating. If you have 5 tiles left and 4 mines, it drops to 20%. By watching this AI-driven data, our players make "Informed Exits" — knowing exactly when the math is no longer in their favor.</p>` },
        { n:'4', t:'Advanced Tactic: The "Corner-Trapping" Pattern', b:`<p>Professional players on our site often use the "L-Shape" or "Square" pattern in the corners of the grid. Our AI tracking shows that players who stick to a consistent geometric pattern have a 12% higher retention of profit over long sessions. Our "Pattern Memory" tool even allows you to save your favorite "Safe Paths" and play them instantly with a single click.</p>` },
        { n:'5', t:'The "Cash-Out" Mastery: No Minimum Limits', b:`<div class="highlight-box"><p><strong>The Freedom:</strong> On our site, if you open one tile and see a diamond, you can click "Cash Out" immediately.</p><p><strong>AI Speed:</strong> Our "Turbo Cashout" is synced directly with your EasyPaisa and JazzCash integration. You can turn a 1,000 PKR bet into 1,200 PKR in exactly three seconds, cash out, and have that profit ready for withdrawal.</p></div>` },
        { n:'6', t:'Why Play Mines on Our Platform?', b:`<div class="highlight-box"><p><strong>Provably Fair Transparency:</strong> Every round generates a Client Seed and a Server Seed. You can copy these hashes after any round to verify that the mines were not moved during your play.</p><p><strong>Zero-Lag Interface:</strong> Our grid is built on High-Performance WebGL, ensuring that your cursor and the tile reveal are perfectly synchronized.</p><p><strong>AI "Greed Warning":</strong> If our AI detects that you have reached a multiplier of 10x or higher, a subtle "Profit Alert" glows on the Cash Out button.</p></div>` },
        { n:'7', t:'The "Diamond Streak" Bonus', b:`<p>If you record a streak of 10 "All-Diamond" rounds (playing with 1–3 mines), our AI triggers a "Mine-Sweeper Bonus." This adds a random multiplier boost to your next 5 rounds, effectively giving you "Insurance" against the next mine you hit.</p>` },
    ]},
    15: { sections: [
        { n:'1', t:'The Core Concept: The Gravity Gamble', b:`<p>The game is simple: A ball is dropped from the top of a triangular pyramid of pegs. As it falls, it bounces randomly off the pegs until it lands in one of the colored slots at the bottom. Each slot has a multiplier (e.g., 0.2x, 2x, 29x, 1000x). Baji's Plinko uses blockchain-based "Provably Fair" technology, meaning you can verify that every single bounce was 100% random and not rigged.</p>` },
        { n:'2', t:'Customizing Your Board (The "Pro" Setup)', b:`<div class="highlight-box"><p><strong>Low Risk:</strong> Multipliers are closer together (e.g., 0.5x to 5x). You win often, but the wins are small. Great for clearing "Bonus Wagering" requirements.</p><p><strong>Normal Risk:</strong> A balanced mix.</p><p><strong>High Risk:</strong> The center slots pay almost nothing (0.2x), but the edges skyrocket to 1000x. This is where the life-changing wins happen.</p></div><p>You can also choose rows (8 to 16). More rows create more "Chaos," making it harder to hit the edges but increasing the max multiplier significantly.</p>` },
        { n:'3', t:'The "AI-Pattern" Strategy: How to Play Smart', b:`<p><strong>The "Multiple Drop" Tactic:</strong> Instead of dropping one ball for 100 PKR, drop 10 balls for 10 PKR in quick succession on Baji. This evens out the variance and increases your chances of one ball catching an edge.</p><p><strong>The 16-Row High-Risk Strategy:</strong> Set the board to 16 rows and "High Risk." Only use 1% of your total balance per drop. History shows that the 1000x multiplier usually hits within a cycle of 500–1000 drops.</p><p><strong>The "Center Reset":</strong> If you notice 10 balls in a row landing in the 0.2x center slots, switch the risk level to "Low" for 5 drops to "reset" the RNG rhythm.</p>` },
        { n:'4', t:'Why Play Plinko on Baji?', b:`<div class="highlight-box"><p><strong>Instant Payouts:</strong> The second the ball hits the slot, your Baji balance updates. Zero waiting time.</p><p><strong>Auto-Mode:</strong> You can set the game to drop 100 balls automatically, and even set it to "Stop if balance decreases by X amount."</p><p><strong>Mobile Optimization:</strong> Baji's Plinko interface is designed for one-handed play. You can manage your "Drops" with a single thumb.</p></div>` },
        { n:'5', t:'Plinko vs. Aviator: Which is Better?', b:`<p>Aviator requires fast reflexes and "Greed Control" (knowing when to cash out). Plinko is a "Set and Forget" game. Once you drop the ball, your job is done. It is much less stressful and perfect for players who prefer a visual, relaxing experience without the pressure of a countdown.</p>` },
        { n:'6', t:'The "Hot & Cold" Tracker', b:`<p>Baji provides a "History" bar at the top of the Plinko screen. Pro Tip: Look for "Cold" edges. If the 100x or 1000x slots haven't been hit in the last 500 drops, the mathematical probability of a "Correction" increases. This is the best time to slightly increase your bet size.</p>` },
    ]},
    16: { sections: [
        { n:'1', t:'The Core Concept: Higher, Lower, or Same?', b:`<p>The game starts with one face-up card. You must predict whether the next card drawn will be Higher (or same) or Lower (or same) than the current one. The Payout: The harder the guess, the higher the multiplier. For example, if the current card is a 3, guessing "Lower" is very risky and pays a huge multiplier, while guessing "Higher" is safer and pays less. After every correct guess, you can take your winnings and walk away.</p>` },
        { n:'2', t:'The "3-Card" Advantage on Baji', b:`<p>Baji's version of HiLo often features a unique twist from Spribe: instead of one mystery card, you are presented with three cards to choose from. You make your "High" or "Low" prediction first, then you pick one of the three face-down cards. This adds an extra layer of choice and significantly increases the "hit rate" for strategic players.</p>` },
        { n:'3', t:'The "AI-Probability" Strategy: When to Skip', b:`<p><strong>The "Middle Card" Trap:</strong> If the face-up card is a 7, 8, or 9, the odds are almost 50/50. Smart players use the "Skip" feature to wait for an "Extreme Card."</p><p><strong>The "Extreme Edge" Strategy:</strong> Only place bets when the card is an Ace, 2, or 3 (Bet Higher) or a Queen or King (Bet Lower). This gives you an 80–90% mathematical probability of winning.</p><p><strong>The "3-Step" Cash Out:</strong> The most profitable players on Baji follow a "3-Step" rule: Get three correct guesses in a row, cash out the multiplier, and start over with a fresh card.</p>` },
        { n:'4', t:'Card Values: Know Your Deck', b:`<div class="highlight-box"><p><strong>Ace:</strong> Usually the lowest card (value of 1). If you get an Ace, always bet Higher.</p><p><strong>King:</strong> The highest card. If you get a King, always bet Lower.</p><p><strong>Joker/Wilds:</strong> In standard Spribe HiLo, focus on the 2 through King hierarchy.</p></div>` },
        { n:'5', t:'Why Play HiLo on Baji?', b:`<div class="highlight-box"><p><strong>Low House Edge:</strong> HiLo has one of the highest RTPs (Return to Player) on the platform, often sitting at 97%.</p><p><strong>Live History:</strong> Baji displays the last 10 cards drawn at the bottom of the screen.</p><p><strong>Instant Wallet Updates:</strong> Your winnings are credited the millisecond you hit "Cash Out."</p></div>` },
        { n:'6', t:'The "Same Card" Bonus', b:`<p>On Baji, if the next card is the exact same as the current one (e.g., a 5 of Hearts followed by a 5 of Spades), it counts as a win for both Higher and Lower bets! This "safety net" is what makes HiLo more forgiving than other card games like Blackjack.</p>` },
    ]},
    17: { sections: [
        { n:'1', t:'The Core Concept: Blue vs. Red', b:`<p>The game is as straightforward as it gets. You choose a side (usually Red or Blue) and place your bet. A physical or digital coin is flipped, and if it lands on your chosen color, you win. In the standard version, a correct guess doubles your money (2x). In the Live version, the coin sides are assigned random multipliers before the flip, meaning a simple 50/50 guess can turn into a massive jackpot.</p>` },
        { n:'2', t:'The Game Phases (Live Version)', b:`<div class="highlight-box"><p><strong>The Slot Phase:</strong> You spin a 3-reel slot to qualify for the bonus round and collect "Scatter" multipliers.</p><p><strong>The Top-Up Phase:</strong> Once qualified, you can increase the multipliers on the Red or Blue sides by spinning a separate wheel.</p><p><strong>The Coin Flip:</strong> The live host pulls a lever, the coin flips, and the final multiplier is applied to your total bet.</p></div>` },
        { n:'3', t:'The "AI-Stat" Strategy: Stop Chasing Patterns', b:`<p><strong>The Gambler's Fallacy:</strong> If the coin lands Red five times in a row, many players think Blue is "due" to hit. Baji's RNG ensures every flip is 100% independent.</p><p><strong>The "Same Side" Strategy:</strong> Our data shows that the most successful long-term players pick one color and stick with it for the entire session. This reduces "Decision Fatigue."</p><p><strong>Multi-Betting:</strong> Bet 100 PKR on Red (Safe) and 20 PKR on Blue (High Multiplier). This "Hedge" strategy protects your balance while keeping you in the hunt for the jackpot.</p>` },
        { n:'4', t:'Why Play Coin Flip on Baji?', b:`<div class="highlight-box"><p><strong>High-Definition Streaming:</strong> The Live Coin Flip rooms on Baji are broadcast in 4K with zero lag.</p><p><strong>Low Entry Barrier:</strong> You can start flipping for as little as 10 PKR.</p><p><strong>Provably Fair:</strong> For the non-live versions, Baji provides a "Seed Hash" that you can check to prove the flip was not manipulated.</p></div>` },
        { n:'5', t:'Coin Flip vs. Roulette', b:`<p><strong>Speed:</strong> A round of Coin Flip takes about 10 seconds, whereas Roulette takes nearly a minute.</p><p><strong>Simplicity:</strong> There are no "Inside/Outside" bets or "Split" bets to worry about. It is a binary choice: Red or Blue.</p><p><strong>Visual Excitement:</strong> There is a unique tension in watching a physical coin bounce that a digital wheel just can't replicate.</p>` },
        { n:'6', t:'The "Top-Up" Secret', b:`<p>In the Live version, the Top-Up phase is where the pros make their money. If you qualify for the flip with a small bet, use the Top-Up phase to aggressively boost the side that currently has the lower multiplier. This balances your potential return so that no matter which side the coin lands on, you leave the round with a profit.</p>` },
    ]},
    18: { sections: [
        { n:'1', t:'The Core Concept: The Six Symbols', b:`<p>Jhandi Munda is played with six special six-sided dice. Instead of numbers, each face features a unique symbol: Jhandi (Flag), Munda (Crown/Face), Itta (Diamond), Paan (Heart), Hukum (Spade), and Chidi (Club). Your goal is to predict which symbol will appear face-up the most times in a single roll.</p>` },
        { n:'2', t:'The Payout Table: Scaling Your Wins', b:`<div class="highlight-box"><p><strong>1 Die:</strong> You usually get your bet back (or a small 1:1 payout).</p><p><strong>2 Dice:</strong> 2x payout + your original bet.</p><p><strong>3 Dice:</strong> 3x payout + your original bet.</p><p><strong>Up to 6 Dice:</strong> A massive 6x payout plus your stake. On Baji, some "Fixed Return" tables offer a flat 3.4x return if your symbol appears at least twice.</p></div>` },
        { n:'3', t:'The "AI-Pattern" Strategy: Hot vs. Cold', b:`<p><strong>Tracking the "Hot" Symbol:</strong> Baji's interface shows you which symbols have appeared most frequently in the last 20 rounds. Many pros follow the momentum, betting on the hot symbol until the streak breaks.</p><p><strong>The "Spread" Technique:</strong> Bet 40% on a "Hot" symbol and 20% each on two "Cold" symbols. This covers half the board and ensures that even if the main streak ends, you likely recoup your losses.</p><p><strong>The "Low-Risk" Entry:</strong> If you are new, stick to the Heart and Diamond symbols — statistically the most "balanced" on many digital RNG engines.</p>` },
        { n:'4', t:'Why Play Jhandi Munda on Baji?', b:`<div class="highlight-box"><p><strong>Authentic Feel:</strong> Baji uses high-quality sound effects that mimic the traditional "bucket shake" of the dice, providing a nostalgic experience.</p><p><strong>24/7 Availability:</strong> Unlike the street game which only happens during festivals, you can play Jhandi Munda on Baji anytime, anywhere.</p><p><strong>Safe &amp; Licensed:</strong> Baji's Jhandi Munda is certified by international gaming labs, ensuring that every roll of the six dice is 100% random.</p></div>` },
        { n:'5', t:'Jhandi Munda vs. Roulette', b:`<p>Roulette has 37–38 numbers, making it harder to guess a specific outcome. Jhandi Munda only has 6 symbols. With 6 dice being rolled at once, the mathematical probability of hitting at least one of your symbols is significantly higher than hitting a single number in Roulette.</p>` },
        { n:'6', t:'The "Festival" Bonus', b:`<p>During major South Asian holidays (like Diwali), Baji often runs Jhandi Munda Leaderboards. By playing consistently, you can earn "Points" that put you in the running for extra cash prizes and "Risk-Free" bets, allowing you to play the "Crown" for free!</p>` },
    ]},
    19: { sections: [
        { n:'1', t:'The Core Concept: Pick, Match, and Win', b:`<p>Keno is played on a grid of 80 numbers (1 to 80). You choose a set of numbers (called "Spots"), and then the game randomly draws 20 numbers. The more of your chosen numbers that match the drawn numbers, the higher your payout. You can choose as few as 1 number or as many as 10 (and sometimes up to 15 or 20 in special Baji variants).</p>` },
        { n:'2', t:'Understanding the "Pay Table"', b:`<p>In Keno, your payout doesn't just depend on how many numbers you catch, but also on how many you picked in total. The Sweet Spot: Most expert Keno players on Baji stick to 4, 5, or 6 numbers. This range offers a great balance between "win frequency" and "payout size."</p>` },
        { n:'3', t:'The "AI-Lottery" Strategy: Smart Number Selection', b:`<div class="highlight-box"><p><strong>The Momentum Play:</strong> Bet on "Hot" numbers that are currently on a streak in the last 100 draws.</p><p><strong>The Due-Date Play:</strong> Bet on "Cold" numbers, betting that the RNG is "due" to pick them soon to balance the averages.</p><p><strong>The "Cluster" Method:</strong> Choose numbers in small groups (e.g., 12, 13, 22, 23) to manage the board visually.</p><p><strong>The 2% Rule:</strong> Never bet more than 2% of your total wallet on a single draw. This allows you to stay in the game long enough to hit a "5-of-5" or "6-of-6" match.</p></div>` },
        { n:'4', t:'Why Play Keno on Baji?', b:`<div class="highlight-box"><p><strong>Instant Results:</strong> Baji's Keno draws happen the moment you hit "Play." No waiting, just instant action.</p><p><strong>Auto-Play/Multi-Race:</strong> You can select your lucky numbers once and set them to play for the next 10, 20, or 50 draws.</p><p><strong>Provably Fair Tech:</strong> Using Spribe's Keno on Baji ensures that every draw is encrypted and verifiable.</p></div>` },
        { n:'5', t:'Keno vs. Bingo', b:`<p>Bingo is a passive game; you wait for your card to be called. Keno is an active game; you choose the numbers and the risk level. It gives you more control over your strategy and potential rewards.</p>` },
        { n:'6', t:'The "Jackpot" Potential', b:`<p>On Baji, certain Keno variants include a Progressive Jackpot. If you choose 10 numbers and match all 10, you don't just win a multiplier — you can win a share of a massive prize pool that grows every time someone plays. Always check for the "Jackpot" icon in the Baji game lobby!</p>` },
    ]},
    20: { sections: [
        { n:'1', t:'The Core Concept: Build or Bust', b:`<p>The game presents you with a tower and multiple "tiles" or "blocks" per floor. You choose one tile to place the next floor. If it's solid: Your multiplier increases, and you move up to the next level. If it collapses: The game ends, and you lose your bet. The Goal: Decide when to "Cash Out" your accumulated multiplier before the tower falls.</p>` },
        { n:'2', t:'Choosing Your Risk Level (The Secret Weapon)', b:`<div class="highlight-box"><p><strong>Easy Mode:</strong> 3 or 4 tiles per row, with only 1 "trap" tile. High chances of winning, but multipliers grow slowly.</p><p><strong>Medium Mode:</strong> 2 or 3 tiles per row. A balanced mix of risk and reward.</p><p><strong>Hard/Expert Mode:</strong> Only 1 "safe" tile and multiple traps. The multipliers are huge (often 2x or 3x for just one floor), but one mistake ends it all.</p></div>` },
        { n:'3', t:'The "AI-Architect" Strategy: How to Build Profit', b:`<p><strong>The "Three-Floor Rule":</strong> Our 2026 data shows that the "sweet spot" for cashing out on Medium difficulty is the 3rd floor. At this point, you have usually doubled your money (2.00x to 2.50x). Take the profit and start a new tower.</p><p><strong>The "Frozen Floor" Bonus:</strong> In versions like Tower Rush, look out for the Frozen Floor feature. It locks in your current multiplier and gives you a "free" attempt at the next level.</p><p><strong>The Martingale Tower:</strong> Because you can choose an "Easy" difficulty with a nearly 75% win rate, some players use a modified Martingale strategy — if you lose a floor, double your bet on the next tower's first floor to recoup the loss quickly.</p>` },
        { n:'4', t:'Why Play Tower on Baji?', b:`<div class="highlight-box"><p><strong>Provably Fair Tech:</strong> Like all top-tier games on Baji, Tower uses "Provable Fairness." You can verify the result of every floor.</p><p><strong>Visual Progression:</strong> There is a unique psychological satisfaction in seeing your tower grow. It feels more like a "game" and less like a "gamble."</p><p><strong>Instant Cash-Out:</strong> The "Cash Out" button is always active after a successful move.</p></div>` },
        { n:'5', t:'Tower vs. Mines', b:`<p>Mines gives you a grid where you pick spots blindly. Tower is linear. You know exactly which floor you are on and what the next multiplier will be. It is better for players who like to "visualize" their progress and feel more in control of their session.</p>` },
        { n:'6', t:'The "Triple Build" Power-Up', b:`<p>On Baji, certain Tower variants allow for a "Triple Build" move. This automatically places three floors at once. Pro-Tip: Only use Triple Build on the first three floors of an Easy tower. Never use it near the top where the risk of a collapse is at its peak!</p>` },
    ]},
};
