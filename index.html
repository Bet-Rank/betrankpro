<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baji Games Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #004d40; --accent: #ffcc00; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif; background: #0f2027; background: linear-gradient(135deg, #0f2027, #203a43);
            color: #fff; margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass);
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }

        .btn-auth {
            background: var(--accent); color: #000; padding: 8px 25px; border-radius: 50px;
            text-decoration: none; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        /* --- Hero & Payments --- */
        .hero { text-align: center; padding: 30px 5%; }
        
        .payment-strip {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0;
        }

        .pay-card {
            background: var(--glass); padding: 10px 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .pay-card i { color: var(--accent); font-size: 1.2rem; }

        .links-section {
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px;
            max-width: 500px; margin: 20px auto; border: 1px solid var(--glass);
        }

        .link-item { margin-bottom: 15px; }
        .link-label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 5px; }
        .link-value { 
            background: #000; padding: 10px; border-radius: 8px; font-family: monospace; 
            border: 1px solid var(--accent); color: var(--accent); font-size: 0.9rem;
            word-break: break-all;
        }

        /* --- Game Grid --- */
        .category-label {
            padding: 0 5%; margin-top: 40px; color: var(--accent); 
            text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem;
            border-left: 4px solid var(--accent); margin-left: 5%;
        }

        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px; padding: 20px 5% 50px;
        }

        .game-card {
            background: var(--glass); border-radius: 20px; overflow: hidden;
            cursor: pointer; transition: 0.4s; border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .game-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .game-card img { width: 100%; height: 200px; object-fit: cover; transition: 0.5s; }
        .game-card:hover img { transform: scale(1.1); }

        .game-info { 
            padding: 15px; text-align: center; font-weight: 600; font-size: 1rem; 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            position: absolute; bottom: 0; width: 100%; box-sizing: border-box;
        }

        /* --- Modal --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #161616; width: 90%; max-width: 550px; border-radius: 25px;
            padding: 30px; border: 1px solid var(--accent); position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--accent); }

        .play-now {
            display: block; width: 100%; padding: 18px; background: var(--accent);
            color: #000; text-align: center; text-decoration: none; font-weight: 800;
            border-radius: 15px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px;
        }

        @media (max-width: 500px) { .game-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } .game-card img { height: 150px; } }
    </style>
</head>
<body>

<header>
    <div class="logo">BAJI GAMES</div>
    <a href="YOUR_AFFILIATE_LINK" class="btn-auth">Login / Sign Up</a>
</header>

<div class="hero">
    <h1>Premier Gaming Hub</h1>
    <p>Easy Withdrawal | Instant Payouts</p>

    <div class="payment-strip">
        <div class="pay-card"><i class="fas fa-mobile-alt"></i> EasyPaisa</div>
        <div class="pay-card"><i class="fas fa-wallet"></i> JazzCash</div>
        <div class="pay-card"><i class="fas fa-university"></i> Bank Transfer</div>
        <div class="pay-card"><i class="fab fa-bitcoin"></i> Crypto / USDT</div>
    </div>

    <div class="links-section">
        <div class="link-item">
            <span class="link-label">Your Referral Link:</span>
            <div class="link-value">ref_link_12345</div>
        </div>
        <div class="link-item">
            <span class="link-label">Your Affiliate Link:</span>
            <div class="link-value">aff_link_67890</div>
        </div>
    </div>
</div>

<div class="category-label">Instant & Crash Games</div>
<div class="game-grid" id="crash-grid"></div>

<div class="category-label">Fishing Arcade</div>
<div class="game-grid" id="fishing-grid"></div>

<div class="category-label">Mines & Table Mini</div>
<div class="game-grid" id="table-grid"></div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-top:0; color:var(--accent)">Game Name</h2>
        <p id="m-desc" style="color:#ccc; font-size:1rem; line-height:1.6;"></p>
        <div id="m-howto" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; font-size:0.9rem; border-left: 3px solid var(--accent);">
            <strong style="color:var(--accent)">How to Play:</strong><br><span id="m-steps"></span>
        </div>
        <a href="YOUR_AFFILIATE_LINK" class="play-now">Play Now & Win</a>
    </div>
</div>

<script>
    const games = [
        // CRASH GAMES — real Cloudinary images
        {
            id: 1, cat: 'crash', name: 'Aviator',
            img: 'https://res.cloudinary.com/dqjualbld/image/upload/v1775219217/aviator_l2m2ho.jpg',
            desc: 'The world-famous social crash game. Watch the plane fly and the multiplier grow. Cash out before the plane flies away!',
            how: '1. Place your bet.\n2. Watch the multiplier climb.\n3. Click Cash Out before the plane disappears to win.'
        },
        {
            id: 2, cat: 'crash', name: 'Aero',
            img: 'https://res.cloudinary.com/dqjualbld/image/upload/v1775219304/aero_s6qmfs.jpg',
            desc: 'High-octane aero-themed crash game. Experience smooth gameplay and rapid multipliers as you soar through the clouds.',
            how: '1. Select stake.\n2. Watch the Aero altitude.\n3. Collect winnings before the flight ends.'
        },
        {
            id: 3, cat: 'crash', name: 'Football Manager',
            img: 'https://res.cloudinary.com/dqjualbld/image/upload/v1775219304/football_manager_yv56k1.png',
            desc: 'The ultimate sports-themed instant win game. Manage your luck and score big multipliers in this football simulation.',
            how: '1. Choose your betting market.\n2. Start the match instantly.\n3. Score goals to increase your payout.'
        },
        {
            id: 7, cat: 'crash', name: 'Cricket X',
            img: 'https://placehold.co/300x200/1a2a1a/ffcc00?text=Cricket+X',
            desc: 'Cricket-themed multiplier crash game. Watch the ball soar and cash out at the right moment to win big!',
            how: '1. Place your bet.\n2. Watch the cricket ball multiplier rise.\n3. Cash out before it gets bowled out.'
        },

        // FISHING GAMES — real Cloudinary images
        {
            id: 4, cat: 'fishing', name: 'Dinosaur Tycoon',
            img: 'https://res.cloudinary.com/dqjualbld/image/upload/v1775219304/dinosaur_tyconn_qy37gj.jpg',
            desc: 'Step into a prehistoric world. Hunt massive dinosaurs with powerful weapons to unlock hidden treasures.',
            how: '1. Aim at the dinosaurs.\n2. Use special ammo for larger beasts.\n3. Take down the Golden T-Rex for the jackpot.'
        },
        {
            id: 5, cat: 'fishing', name: 'Dragon Fortune',
            img: 'https://res.cloudinary.com/dqjualbld/image/upload/v1775219304/dragon_fortune_jjql4y.jpg',
            desc: 'A mythical hunting game where dragons guard ancient gold. Use high-powered cannons to claim your fortune.',
            how: '1. Choose your target dragon.\n2. Blast through dragon eggs for bonuses.\n3. Slay the Boss Dragon for the ultimate multiplier.'
        },
        {
            id: 8, cat: 'fishing', name: 'Happy Fishing',
            img: 'https://placehold.co/300x200/0a1a2a/ffcc00?text=Happy+Fishing',
            desc: 'Popular underwater shooter packed with colorful sea creatures and massive jackpot fish.',
            how: '1. Choose your cannon power.\n2. Shoot fish to earn coins.\n3. Use lock-on skill for big targets.'
        },

        // TABLE / MINES GAMES — real Cloudinary + fixed placeholders
        {
            id: 6, cat: 'table', name: 'Andar Bahar',
            img: 'https://res.cloudinary.com/dqjualbld/image/upload/v1775219304/andar_bahar_nb1uuj.jpg',
            desc: 'The traditional South Asian card game optimized for instant play. Fast, fair, and incredibly exciting.',
            how: '1. Predict which side (Andar or Bahar) will match the Joker card.\n2. Place your bet.\n3. Win instantly when the card appears.'
        },
        {
            id: 9, cat: 'table', name: 'Mines',
            img: 'https://placehold.co/300x200/1a0a2a/ffcc00?text=Mines',
            desc: 'Avoid bombs, find diamonds. The more tiles you reveal safely, the higher your multiplier grows.',
            how: '1. Set the number of mines.\n2. Click tiles to reveal stars.\n3. Cash out before hitting a mine.'
        },
        {
            id: 10, cat: 'table', name: 'Plinko',
            img: 'https://placehold.co/300x200/2a1a0a/ffcc00?text=Plinko',
            desc: 'Classic ball drop physics game. Watch the ball bounce through pegs and land on a multiplier slot.',
            how: '1. Select your risk level.\n2. Drop the ball from the top.\n3. Win based on which slot the ball lands in.'
        }
    ];

    function loadGames() {
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openModal(game.name, game.desc, game.how);
            card.innerHTML = `
                <img src="${game.img}" alt="${game.name}" loading="lazy">
                <div class="game-info">${game.name}</div>
            `;
            document.getElementById(`${game.cat}-grid`).appendChild(card);
        });
    }

    function openModal(name, desc, how) {
        document.getElementById('m-title').innerText = name;
        document.getElementById('m-desc').innerText = desc;
        document.getElementById('m-steps').innerText = how;
        document.getElementById('gameModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
    window.onclick = e => { if (e.target == document.getElementById('gameModal')) closeModal(); }

    window.onload = loadGames;
</script>

</body>
</html>
